<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, ui-sans-serif, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1320"/>
      <stop offset="1" stop-color="#141a2b"/>
    </linearGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7aa2ff"/>
      <stop offset="1" stop-color="#9a7cff"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.8" cy="0.1" r="0.9">
      <stop offset="0" stop-color="#9a7cff" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#9a7cff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <rect width="800" height="500" fill="url(#glow)"/>

  <!-- flight path -->
  <path d="M80 120 C 260 30, 540 30, 720 120" stroke="rgba(122,162,255,0.35)" stroke-width="2" stroke-dasharray="2 8" fill="none"/>
  <circle cx="80" cy="120" r="6" fill="#7aa2ff"/>
  <circle cx="720" cy="120" r="6" fill="#9a7cff"/>
  <g transform="translate(388,52) rotate(14)">
    <path d="M0 8 24 8 34 -6 40 -6 34 8 52 8 58 0 64 8 58 16 52 8 40 22 34 22 40 8 24 8Z" transform="scale(0.9) rotate(76 32 8)" fill="#dbe5f6" opacity="0.9"/>
  </g>
  <text x="80" y="152" fill="#dbe5f6" font-size="20" font-weight="700" text-anchor="middle">JFK</text>
  <text x="720" y="152" fill="#dbe5f6" font-size="20" font-weight="700" text-anchor="middle">SFO</text>

  <!-- boarding pass -->
  <g transform="translate(120,190)">
    <rect width="560" height="220" rx="20" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.14)"/>
    <rect width="560" height="54" rx="20" fill="rgba(122,162,255,0.14)"/>
    <rect y="34" width="560" height="20" fill="rgba(122,162,255,0.14)"/>
    <text x="24" y="34" fill="#e8eefb" font-size="16" font-weight="700">BOARDING PASS</text>
    <text x="536" y="34" fill="#bcd0f7" font-size="14" font-weight="600" text-anchor="end">Flight JO-2027</text>

    <!-- perforation -->
    <line x1="420" y1="66" x2="420" y2="208" stroke="rgba(255,255,255,0.18)" stroke-width="2" stroke-dasharray="3 8"/>

    <g fill="#98a4b8" font-size="11" letter-spacing="1.5" font-weight="600">
      <text x="24" y="92">PASSENGER</text>
      <text x="24" y="146">DEPART</text>
      <text x="180" y="146">ARRIVE</text>
      <text x="300" y="146">GATE</text>
      <text x="24" y="196"></text>
    </g>
    <g fill="#e8eefb" font-size="16" font-weight="650">
      <text x="24" y="114">CUSTOMER #1042</text>
      <text x="24" y="168">08:45</text>
      <text x="180" y="168">12:10</text>
      <text x="300" y="168">B22</text>
    </g>

    <!-- seat + barcode stub -->
    <text x="444" y="92" fill="#98a4b8" font-size="11" letter-spacing="1.5" font-weight="600">SEAT</text>
    <text x="444" y="122" fill="url(#acc)" font-size="30" font-weight="800">14A</text>
    <g transform="translate(444,140)" fill="#dbe5f6" opacity="0.75">
      <rect width="4" height="48"/><rect x="8" width="2" height="48"/><rect x="14" width="6" height="48"/>
      <rect x="24" width="3" height="48"/><rect x="31" width="5" height="48"/><rect x="40" width="2" height="48"/>
      <rect x="46" width="4" height="48"/><rect x="54" width="7" height="48"/><rect x="65" width="3" height="48"/>
      <rect x="72" width="5" height="48"/><rect x="81" width="2" height="48"/><rect x="87" width="5" height="48"/>
    </g>

    <!-- SQL chip row -->
    <g transform="translate(24,182)" font-size="12" font-weight="600">
      <rect width="64" height="26" rx="13" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)"/>
      <text x="32" y="17" fill="#dbe5f6" text-anchor="middle">PHP</text>
      <g transform="translate(72,0)">
        <rect width="76" height="26" rx="13" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)"/>
        <text x="38" y="17" fill="#dbe5f6" text-anchor="middle">MySQL</text>
      </g>
      <g transform="translate(156,0)">
        <rect width="150" height="26" rx="13" fill="rgba(122,162,255,0.12)" stroke="rgba(122,162,255,0.4)"/>
        <text x="75" y="17" fill="#bcd0f7" text-anchor="middle">Normalized schema</text>
      </g>
    </g>
  </g>

  <text x="120" y="452" fill="#98a4b8" font-size="13" letter-spacing="2" font-weight="600">FULL-STACK RESERVATION SYSTEM</text>
</svg>
