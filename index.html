<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Justin Oh | Portfolio</title>
  <meta name="description" content="Computer engineering portfolio for Justin Oh" />
  <style>
    :root {
      --bg: #090b10;
      --bg-soft: #10141d;
      --card: rgba(18, 24, 36, 0.72);
      --card-border: rgba(255,255,255,0.08);
      --text: #f4f7fb;
      --muted: #98a4b8;
      --line: rgba(255,255,255,0.09);
      --accent: #7aa2ff;
      --accent-2: #9a7cff;
      --shadow: 0 18px 60px rgba(0,0,0,0.35);
      --max: 1180px;
      --radius: 26px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 10%, rgba(122,162,255,0.16), transparent 28%),
        radial-gradient(circle at 85% 15%, rgba(154,124,255,0.14), transparent 25%),
        radial-gradient(circle at 50% 80%, rgba(122,162,255,0.09), transparent 30%),
        var(--bg);
      line-height: 1.6;
    }

    a { color: inherit; text-decoration: none; }
    img { max-width: 100%; display: block; }

    .container {
      width: min(calc(100% - 2rem), var(--max));
      margin: 0 auto;
    }

    .nav-wrap {
      position: sticky;
      top: 0;
      z-index: 50;
      padding: 1rem 0;
      backdrop-filter: blur(18px);
      background: linear-gradient(to bottom, rgba(9,11,16,0.75), rgba(9,11,16,0.2));
    }

    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      border: 1px solid var(--card-border);
      background: rgba(14,18,27,0.7);
      box-shadow: var(--shadow);
      border-radius: 999px;
      padding: 0.9rem 1.2rem;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .brand-mark {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: white;
      font-size: 0.95rem;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 10px 30px rgba(122,162,255,0.28);
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 1.2rem;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .nav-links a:hover,
    .footer-links a:hover,
    .project-links a:hover,
    .contact-item a:hover {
      color: var(--text);
    }

    .hero {
      min-height: calc(100vh - 110px);
      display: grid;
      align-items: center;
      padding: 3.5rem 0 5rem;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: 2rem;
      align-items: stretch;
    }

    .glass {
      background: var(--card);
      border: 1px solid var(--card-border);
      backdrop-filter: blur(18px);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .hero-copy {
      padding: 3rem;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 560px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      width: fit-content;
      padding: 0.45rem 0.85rem;
      border-radius: 999px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      color: #d8e2f2;
      font-size: 0.9rem;
    }

    .eyebrow::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 0 0 6px rgba(122,162,255,0.12);
    }

    h1 {
      margin: 1rem 0 1rem;
      font-size: clamp(3rem, 6vw, 5.8rem);
      line-height: 0.95;
      letter-spacing: -0.05em;
      max-width: 9ch;
    }

    .subhead {
      max-width: 62ch;
      color: #dbe5f6;
      font-size: 1.08rem;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.9rem;
      margin-top: 2rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.55rem;
      padding: 0.95rem 1.2rem;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.1);
      font-weight: 600;
      transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease;
      cursor: pointer;
    }

    .btn:hover { transform: translateY(-2px); }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      border: none;
      color: white;
    }

    .btn-secondary {
      background: rgba(255,255,255,0.04);
      color: var(--text);
    }

    .hero-meta {
      margin-top: 2.2rem;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 0.9rem;
    }

    .meta-card {
      padding: 1rem;
      border-radius: 20px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
    }

    .meta-label {
      font-size: 0.8rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .meta-value {
      margin-top: 0.45rem;
      font-weight: 650;
      color: var(--text);
    }

    .hero-side {
      padding: 1.4rem;
      display: grid;
      gap: 1rem;
      min-height: 560px;
    }

    .portrait {
      position: relative;
      overflow: hidden;
      min-height: 320px;
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.08);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02)),
        radial-gradient(circle at 20% 20%, rgba(122,162,255,0.22), transparent 25%),
        linear-gradient(135deg, #0f1420, #161a26 45%, #0c1019);
      display: grid;
      place-items: end start;
      padding: 1.4rem;
    }

    .portrait.has-image {
      background-size: cover;
      background-position: center;
    }

    .portrait-card {
      max-width: 260px;
      padding: 1rem;
      border-radius: 20px;
      background: rgba(10,13,20,0.72);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .mini-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .mini-card, .skill-chip, .timeline-item, .project-card, .contact-card {
      border: 1px solid rgba(255,255,255,0.08);
    }

    .mini-card {
      border-radius: 22px;
      background: rgba(255,255,255,0.04);
      padding: 1.1rem;
    }

    .section {
      padding: 2rem 0 1.2rem;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .section-head h2 {
      margin: 0;
      font-size: clamp(1.8rem, 4vw, 3rem);
      letter-spacing: -0.04em;
    }

    .section-head p {
      margin: 0;
      color: var(--muted);
      max-width: 50ch;
    }

    .about-grid {
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: 1.2rem;
    }

    .about-card,
    .skills-card,
    .timeline,
    .contact-card,
    .project-card {
      padding: 1.5rem;
    }

    .about-card p,
    .timeline-item p,
    .project-card p,
    .contact-copy,
    .skill-chip span:last-child,
    .mini-card p {
      color: var(--muted);
    }

    .skills-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.7rem;
      margin-top: 1rem;
    }

    .skill-chip {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.8rem 1rem;
      border-radius: 999px;
      background: rgba(255,255,255,0.04);
    }

    .skill-chip span:first-child {
      font-weight: 650;
    }

    .projects-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 1rem;
    }

    .project-card {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      border-radius: 24px;
      background: var(--card);
      transition: transform 0.22s ease, border-color 0.22s ease;
    }

    .project-card:hover {
      transform: translateY(-5px);
      border-color: rgba(122,162,255,0.35);
    }

    .project-thumb {
      aspect-ratio: 16/10;
      border-radius: 18px;
      background:
        linear-gradient(135deg, rgba(122,162,255,0.2), rgba(154,124,255,0.15)),
        linear-gradient(180deg, #0f1521, #171d29);
      border: 1px solid rgba(255,255,255,0.08);
      overflow: hidden;
      position: relative;
      background-size: cover;
      background-position: center;
    }

    .project-thumb::after {
      content: "";
      position: absolute;
      inset: auto 12% 14% 12%;
      height: 18%;
      border-radius: 14px;
      background: rgba(255,255,255,0.08);
      box-shadow:
        0 -56px 0 rgba(255,255,255,0.06),
        0 -112px 0 rgba(255,255,255,0.04);
    }

    .project-thumb.has-image::after {
      display: none;
    }

    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.55rem;
    }

    .tag {
      padding: 0.38rem 0.72rem;
      border-radius: 999px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      color: #d9e2f4;
      font-size: 0.84rem;
    }

    .project-links {
      display: flex;
      gap: 0.75rem;
      margin-top: auto;
      padding-top: 0.3rem;
      flex-wrap: wrap;
    }

    .project-links a {
      font-weight: 650;
      color: #dbe5f7;
    }

    .timeline {
      display: grid;
      gap: 1rem;
    }

    .timeline-item {
      display: grid;
      grid-template-columns: 130px 1fr;
      gap: 1rem;
      padding: 1rem 1rem 1rem 1.1rem;
      border-radius: 22px;
      background: rgba(255,255,255,0.04);
    }

    .timeline-date {
      color: #cdd8ea;
      font-size: 0.92rem;
      font-weight: 650;
    }

    .timeline-item h3,
    .project-card h3,
    .contact-card h3,
    .mini-card h3,
    .about-card h3,
    .skills-card h3 {
      margin: 0 0 0.4rem;
      font-size: 1.08rem;
    }

    .contact-grid {
      display: grid;
      grid-template-columns: 0.95fr 1.05fr;
      gap: 1rem;
    }

    .contact-card {
      border-radius: 24px;
      background: var(--card);
    }

    .contact-list {
      display: grid;
      gap: 0.85rem;
      margin-top: 1.2rem;
    }

    .contact-item {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      padding: 0.95rem 1rem;
      border-radius: 18px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      align-items: center;
    }

    .contact-label {
      color: var(--muted);
      font-size: 0.92rem;
    }

    .availability {
      display: grid;
      place-items: center;
      text-align: center;
      min-height: 100%;
      padding: 2rem;
      background:
        radial-gradient(circle at top, rgba(122,162,255,0.18), transparent 40%),
        rgba(255,255,255,0.04);
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .availability strong {
      display: block;
      font-size: clamp(2rem, 4vw, 3.2rem);
      line-height: 1;
      margin: 0.8rem 0;
      letter-spacing: -0.04em;
    }

    footer {
      padding: 2.5rem 0 4rem;
      color: var(--muted);
    }

    .footer-inner {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 1rem;
      border-top: 1px solid var(--line);
      padding-top: 1.4rem;
    }

    .footer-links {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .reveal {
      opacity: 0;
      transform: translateY(24px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }

    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 980px) {
      .hero-grid,
      .about-grid,
      .contact-grid,
      .projects-grid {
        grid-template-columns: 1fr;
      }

      .hero-copy,
      .hero-side {
        min-height: auto;
      }

      .timeline-item {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 760px) {
      .nav-links {
        display: none;
      }

      .hero-copy,
      .about-card,
      .skills-card,
      .timeline,
      .contact-card,
      .project-card {
        padding: 1.2rem;
      }

      .hero-meta,
      .mini-grid {
        grid-template-columns: 1fr;
      }

      h1 {
        max-width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="nav-wrap">
    <div class="container">
      <nav>
        <a href="#top" class="brand">
          <span class="brand-mark" id="brandMark">JO</span>
          <span id="brandName">Justin Oh</span>
        </a>
        <div class="nav-links">
          <a href="#about">About</a>
          <a href="#projects">Projects</a>
          <a href="#personal">Personal</a>
          <a href="#experience">Experience</a>
          <a href="#contact">Contact</a>
          <a href="cooking.html">Cooking</a>
          <a href="cars.html">Cars</a>
        </div>
      </nav>
    </div>
  </div>

  <main id="top">
    <section class="hero">
      <div class="container hero-grid">
        <div class="glass hero-copy reveal">
          <div>
            <div class="eyebrow" id="eyebrowText"></div>
            <h1 id="heroTitle"></h1>
            <p class="subhead" id="heroSubtitle"></p>
            <div class="hero-actions">
              <a class="btn btn-primary" id="primaryCta" href="#projects">View Projects</a>
              <a class="btn btn-secondary" id="secondaryCta" href="#contact">Get In Touch</a>
            </div>
            <div class="hero-meta" id="heroMeta"></div>
          </div>
        </div>

        <div class="glass hero-side reveal">
          <div class="portrait" id="portraitBlock">
            <div class="portrait-card">
              <div class="meta-label" id="portraitLabel"></div>
              <div class="meta-value" id="portraitText" style="margin-top:.45rem; font-size:1.05rem;"></div>
            </div>
          </div>
          <div class="mini-grid" id="miniCards"></div>
        </div>
      </div>
    </section>

    <section id="about" class="section">
      <div class="container">
        <div class="section-head reveal">
          <div><h2>About</h2></div>
          <p id="aboutSectionNote"></p>
        </div>
        <div class="about-grid">
          <div class="glass about-card reveal">
            <h3 id="aboutTitle"></h3>
            <div id="aboutBody"></div>
          </div>
          <div class="glass skills-card reveal">
            <h3 id="skillsTitle"></h3>
            <div class="skills-list" id="skillsList"></div>
          </div>
        </div>
      </div>
    </section>

    <section id="projects" class="section">
      <div class="container">
        <div class="section-head reveal">
          <div><h2>Selected Projects</h2></div>
          <p id="projectsSectionNote"></p>
        </div>
        <div class="projects-grid" id="projectsGrid"></div>
      </div>
    </section>

    <section id="personal" class="section">
      <div class="container">
        <div class="section-head reveal">
          <div><h2 id="personalSectionTitle">Beyond Engineering</h2></div>
          <p id="personalSectionNote"></p>
        </div>
        <div class="projects-grid" id="personalGrid"></div>
      </div>
    </section>

    <section id="experience" class="section">
      <div class="container">
        <div class="section-head reveal">
          <div><h2>Experience & Growth</h2></div>
          <p id="timelineSectionNote"></p>
        </div>
        <div class="glass timeline reveal" id="timelineList"></div>
      </div>
    </section>

    
    
    <section id="contact" class="section">
      <div class="container">
        <div class="section-head reveal">
          <div><h2>Contact</h2></div>
          <p id="contactSectionNote"></p>
        </div>
        <div class="contact-grid">
          <div class="contact-card reveal">
            <h3 id="contactTitle"></h3>
            <p class="contact-copy" id="contactCopy"></p>
            <div class="contact-list" id="contactList"></div>
          </div>
          <div class="contact-card reveal">
            <div class="availability">
              <div>
                <div class="eyebrow" id="availabilityEyebrow" style="margin:0 auto;"></div>
                <strong id="availabilityHeadline"></strong>
                <p class="contact-copy" id="availabilityCopy" style="max-width: 42ch; margin: 0 auto 1.4rem;"></p>
                <a class="btn btn-primary" id="resumeButton" href="#" target="_blank" rel="noreferrer">Download Resume</a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <div class="container footer-inner">
      <div>© <span id="year"></span> <span id="footerName"></span>. Built for GitHub Pages.</div>
      <div class="footer-links">
        <a href="#projects">Projects</a>
        <a href="#experience">Experience</a>
        <a href="#contact">Contact</a>
      </div>
    </div>
  </footer>

  <script src="content.js"></script>
  <script>
    const byId = (id) => document.getElementById(id);

    function initialsFromName(name) {
      return name
        .split(' ')
        .filter(Boolean)
        .slice(0, 2)
        .map(part => part[0].toUpperCase())
        .join('');
    }

    function renderHeroMeta(items) {
      byId('heroMeta').innerHTML = items.map(item => `
        <div class="meta-card">
          <div class="meta-label">${item.label}</div>
          <div class="meta-value">${item.value}</div>
        </div>
      `).join('');
    }

    function renderMiniCards(items) {
      byId('miniCards').innerHTML = items.map(item => `
        <div class="mini-card">
          <div class="meta-label">${item.label}</div>
          <h3>${item.title}</h3>
          <p>${item.text}</p>
        </div>
      `).join('');
    }

    function renderAboutParagraphs(paragraphs) {
      byId('aboutBody').innerHTML = paragraphs.map(text => `<p>${text}</p>`).join('');
    }

    function renderSkills(skills) {
      byId('skillsList').innerHTML = skills.map(skill => `
        <div class="skill-chip">
          <span>${skill.name}</span>
          <span>${skill.detail}</span>
        </div>
      `).join('');
    }

    function renderProjects(projects) {
      byId('projectsGrid').innerHTML = projects.map(project => {
        const thumbStyle = project.image ? `style="background-image:url('${project.image}')"` : '';
        const thumbClass = project.image ? 'project-thumb has-image' : 'project-thumb';
        const tags = (project.tags || []).map(tag => `<span class="tag">${tag}</span>`).join('');
        const links = (project.links || []).map(link => `<a href="${link.url}" ${link.url.startsWith('#') ? '' : 'target="_blank" rel="noreferrer"'}>${link.label}</a>`).join('');
        return `
          <article class="project-card reveal">
            <div class="${thumbClass}" ${thumbStyle}></div>
            <div class="tag-row">${tags}</div>
            <h3>${project.title}</h3>
            <p>${project.description}</p>
            <div class="project-links">${links}</div>
          </article>
        `;
      }).join('');
    }

    function renderPersonalPages(pages) {
      byId('personalGrid').innerHTML = pages.map(page => {
        const thumbStyle = page.image ? `style="background-image:url('${page.image}')"` : '';
        const thumbClass = page.image ? 'project-thumb has-image' : 'project-thumb';
        const tags = (page.tags || []).map(tag => `<span class="tag">${tag}</span>`).join('');
    
        return `
          <article class="project-card reveal">
            <div class="${thumbClass}" ${thumbStyle}></div>
            <div class="tag-row">${tags}</div>
            <h3>${page.title}</h3>
            <p>${page.description}</p>
            <div class="project-links">
              <a href="${page.href}">Open Page</a>
            </div>
          </article>
        `;
      }).join('');
    }

    function renderTimeline(items) {
      byId('timelineList').innerHTML = items.map(item => `
        <div class="timeline-item">
          <div class="timeline-date">${item.date}</div>
          <div>
            <h3>${item.title}</h3>
            <p>${item.text}</p>
          </div>
        </div>
      `).join('');
    }

    function renderContacts(items) {
      byId('contactList').innerHTML = items.map(item => `
        <div class="contact-item">
          <div>
            <div class="contact-label">${item.label}</div>
            <div>${item.value}</div>
          </div>
          <a href="${item.url}" ${item.url.startsWith('mailto:') ? '' : 'target="_blank" rel="noreferrer"'}>${item.action}</a>
        </div>
      `).join('');
    }

    function applyContent() {
      document.title = `${siteContent.name} | Portfolio`;
      byId('brandName').textContent = siteContent.name;
      byId('footerName').textContent = siteContent.name;
      byId('brandMark').textContent = siteContent.brandMark || initialsFromName(siteContent.name);

      byId('eyebrowText').textContent = siteContent.hero.eyebrow;
      byId('heroTitle').textContent = siteContent.hero.title;
      byId('heroSubtitle').textContent = siteContent.hero.subtitle;
      byId('primaryCta').textContent = siteContent.hero.primaryCta.label;
      byId('primaryCta').href = siteContent.hero.primaryCta.href;
      byId('secondaryCta').textContent = siteContent.hero.secondaryCta.label;
      byId('secondaryCta').href = siteContent.hero.secondaryCta.href;

      byId('personalSectionTitle').textContent = siteContent.personal.sectionTitle;
      byId('personalSectionNote').textContent = siteContent.personal.sectionNote;

      renderHeroMeta(siteContent.hero.meta);
      renderMiniCards(siteContent.hero.sideCards);
      renderPersonalPages(siteContent.personal.pages);

      byId('portraitLabel').textContent = siteContent.hero.portrait.label;
      byId('portraitText').textContent = siteContent.hero.portrait.text;
      if (siteContent.hero.portrait.image) {
        const portrait = byId('portraitBlock');
        portrait.classList.add('has-image');
        portrait.style.backgroundImage = `linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02)), url('${siteContent.hero.portrait.image}')`;
      
      }

      byId('aboutSectionNote').textContent = siteContent.about.sectionNote;
      byId('aboutTitle').textContent = siteContent.about.title;
      renderAboutParagraphs(siteContent.about.paragraphs);
      byId('skillsTitle').textContent = siteContent.about.skillsTitle;
      renderSkills(siteContent.about.skills);

      byId('projectsSectionNote').textContent = siteContent.projects.sectionNote;
      renderProjects(siteContent.projects.items);

      byId('timelineSectionNote').textContent = siteContent.experience.sectionNote;
      renderTimeline(siteContent.experience.items);

      byId('contactSectionNote').textContent = siteContent.contact.sectionNote;
      byId('contactTitle').textContent = siteContent.contact.title;
      byId('contactCopy').textContent = siteContent.contact.copy;
      renderContacts(siteContent.contact.items);

      byId('availabilityEyebrow').textContent = siteContent.contact.availability.eyebrow;
      byId('availabilityHeadline').textContent = siteContent.contact.availability.headline;
      byId('availabilityCopy').textContent = siteContent.contact.availability.copy;
      byId('resumeButton').textContent = siteContent.contact.availability.buttonLabel;
      byId('resumeButton').href = siteContent.contact.availability.buttonUrl;

      byId('year').textContent = new Date().getFullYear();

      const reveals = document.querySelectorAll('.reveal');
      const observer = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            entry.target.classList.add('visible');
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.12 });

      reveals.forEach((el) => observer.observe(el));
    }

    applyContent();
  </script>
</body>
</html>
